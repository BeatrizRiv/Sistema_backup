<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema Backup</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="contenedor">

    <div class="izquierda">

        <h1>Sistema de Backup</h1>

        {% if mensaje %}

            <div class="mensaje">

                {{ mensaje }}

            </div>

        {% endif %}

        <div class="card">

            <h2>Crear Backup</h2>

            <form action="/backup" method="POST">

                <select name="database" required>

                    <option value="">
                        Selecciona una base de datos
                    </option>

                    {% for db in databases %}

                        <option value="{{ db }}">
                            {{ db }}
                        </option>

                    {% endfor %}

                </select>

                <select name="tipo" required>

                    <option value="">
                        Selecciona formato
                    </option>

                    <option value="sql">
                        SQL
                    </option>

                    <option value="gz">
                        Comprimido (.gz)
                    </option>

                    <option value="enc">
                        Cifrado (.enc)
                    </option>

                </select>

                <button type="submit">

                    Crear Backup

                </button>

            </form>

        </div>

        <div class="card">

            <h2>Restaurar Backup</h2>

            <form
                action="/restore"
                method="POST"
                enctype="multipart/form-data"
            >

                <input
                    type="file"
                    name="archivo"
                    required
                    accept=".sql,.gz,.enc"
                >

                <button type="submit">

                    Restaurar Backup

                </button>

            </form>

        </div>

    </div>

    <div class="derecha">

        <div class="card historial">

            <h2>Historial</h2>

            <div class="logs">

                {% for log in logs %}

                    <div class="log">

                        {{ log }}

                    </div>

                {% endfor %}

            </div>

        </div>

    </div>

</div>

</body>

</html>
