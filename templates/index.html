<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Sistema Backup</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="contenedor">

    <div class="panel">

        <h1>Sistema Backup</h1>

        {% if mensaje %}

            <div class="mensaje">
                {{ mensaje }}
            </div>

        {% endif %}

        <!-- 🔵 BACKUP -->
        <h2>Crear Backup</h2>

        <form action="/backup" method="POST">

            <select name="database">

                {% for db in bases %}

                    <option value="{{ db }}">
                        {{ db }}
                    </option>

                {% endfor %}

            </select>

            <select name="type">

                <option value="sql">SQL</option>
                <option value="gz">Comprimido</option>
                <option value="enc">Cifrado</option>

            </select>

            <button type="submit">
                Crear Backup
            </button>

        </form>

        <!-- 🔵 RESTORE (CORREGIDO) -->
        <h2>Restaurar Backup</h2>

        <form
            action="/restore"
            method="POST"
            enctype="multipart/form-data"
        >

            <!-- ❌ eliminado selector de base de datos -->

            <input
                type="file"
                name="file"
                accept=".sql"
                required
            >

            <p style="font-size: 12px; color: red;">
                ⚠ El archivo debe ser un backup .sql válido
            </p>

            <button type="submit">
                Restaurar
            </button>

        </form>

    </div>

    <div class="historial">

        <h2>Historial</h2>

        {% for log in logs %}

            <div class="log">
                {{ log }}
            </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
